plugins {
    id 'java'
    id 'war'
    id 'org.springframework.boot' version '3.4.1'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'  // ✅ Plugin JaCoCo
}

group = 'br.com'
version = '0.0.1-SNAPSHOT'
description = 'blogQATeste'

java {
    sourceCompatibility = '21'
    targetCompatibility = '21'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-mongodb'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-security'

    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    testImplementation platform('org.testcontainers:testcontainers-bom:1.20.4')
    testImplementation 'org.testcontainers:testcontainers'
    testImplementation 'org.testcontainers:mongodb'
    testImplementation 'org.testcontainers:junit-jupiter'

    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'
}

// ========================================
// CONFIGURAÇÃO DE TESTES
// ========================================
tasks.named('test') {
    useJUnitPlatform()

    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1

    environment "TESTCONTAINERS_RYUK_DISABLED", "false"
    environment "TESTCONTAINERS_CHECKS_DISABLE", "false"

    systemProperty "junit.jupiter.execution.parallel.enabled", "false"

    minHeapSize = "512m"
    maxHeapSize = "2048m"

    reports {
        html.required = true
        junitXml.required = true
    }

    testLogging {
        events "passed", "skipped", "failed"
        exceptionFormat "full"
        showExceptions true
        showCauses true
        showStackTraces true
        showStandardStreams = false

        afterSuite { desc, result ->
            if (!desc.parent) {
                println ""
                println "--------------------------------------------------"
                println "Resultados dos Testes:"
                println "--------------------------------------------------"
                println "Testes executados: ${result.testCount}"
                println "Sucessos: ${result.successfulTestCount}"
                println "Falhas: ${result.failedTestCount}"
                println "Ignorados: ${result.skippedTestCount}"
                println "--------------------------------------------------"
            }
        }
    }



    // Gera relatório JaCoCo automaticamente após testes
    finalizedBy jacocoTestReport
}



// ========================================
// CONFIGURAÇÃO JACOCO
// ========================================
jacoco {
    toolVersion = "0.8.11"
}

jacocoTestReport {
    dependsOn test

    reports {
        xml {
            required = true
        }
        html {
            required = true
        }
        csv {
            required = false
        }
    }

    // Excluir classes que não precisam cobertura
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                    '**/QaBlogApplication.class',
                    '**/config/**',
                    '**/dto/**',
                    '**/*Config.class',
                    '**/*Exception.class',
                    '**/domain/TipoQa.class',
                    '**/*Builder.class',
            ])
        }))
    }

    doLast {
        println ""
        println "=" * 70
        println "📊 RELATÓRIO JACOCO GERADO"
        println "=" * 70
        println "🌐 HTML: ${buildDir}/reports/jacoco/test/html/index.html"
        println "📄 XML:  ${buildDir}/reports/jacoco/test/jacocoTestReport.xml"
        println "=" * 70
        println ""
    }
}

// Verificação de cobertura mínima
jacocoTestCoverageVerification {
    dependsOn jacocoTestReport

    violationRules {
        // Regra geral do projeto
        rule {
            enabled = true
            element = 'BUNDLE'

            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.10
            }

            limit {
                counter = 'BRANCH'
                value = 'COVEREDRATIO'
                minimum = 0.10
            }
        }

        // Regra para services (mais rigorosa)
        rule {
            enabled = true
            element = 'CLASS'
            includes = ['br.com.qablog.service.*']

            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.10
            }
        }

        // Regra para domínio
        rule {
            enabled = true
            element = 'CLASS'
            includes = ['br.com.qablog.domain.*']
            excludes = ['br.com.qablog.domain.TipoQa']

            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.10
            }
        }
    }
}

// Integrar verificação com gradle check
check.dependsOn jacocoTestCoverageVerification

// Task customizada para gerar relatório e abrir no navegador
tasks.register('jacocoReport') {
    group = 'verification'
    description = 'Gera relatório JaCoCo e tenta abrir no navegador'

    dependsOn test, jacocoTestReport

    doLast {
        def reportPath = file("${buildDir}/reports/jacoco/test/html/index.html")

        if (reportPath.exists()) {
            println ""
            println "=" * 80
            println "📊 RELATÓRIO JACOCO DISPONÍVEL"
            println "=" * 80
            println "📂 Arquivo: ${reportPath.absolutePath}"
            println ""

            // Tentar abrir no navegador
            def os = System.getProperty('os.name').toLowerCase()
            try {
                if (os.contains('windows')) {
                    exec {
                        commandLine 'cmd', '/c', "start ${reportPath.absolutePath}"
                        ignoreExitValue true
                    }
                } else if (os.contains('mac')) {
                    exec {
                        commandLine 'open', reportPath.absolutePath
                        ignoreExitValue true
                    }
                } else {
                    exec {
                        commandLine 'xdg-open', reportPath.absolutePath
                        ignoreExitValue true
                    }
                }
                println "✅ Abrindo relatório no navegador..."
            } catch (Exception e) {
                println "ℹ️  Abra manualmente o arquivo acima"
            }
            println "=" * 80
            println ""
        } else {
            println "⚠️  Relatório não encontrado. Execute primeiro: ./gradlew test"
        }
    }
}



war {
    enabled = true // ✅ ativa a geração do WAR
    archiveBaseName.set('blogqateste') // nome do arquivo final .war
    archiveVersion.set("")                 // ✅ remove versão do nome
    archiveClassifier.set("")              // ✅ remove "-plain" ou qualquer sufixo
}
